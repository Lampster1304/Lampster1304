name: Estadisticas del perfil

on:
  # Se regeneran solas cada dia a las 6:00 AM (hora RD)
  schedule:
    - cron: "0 10 * * *"
  # Boton para ejecutarlo a mano desde la pestana Actions
  workflow_dispatch:
  # Y tambien al hacer push a main
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Tarjeta principal: resumen, repos, actividad y lenguajes
      - name: Tarjeta general
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics/general.svg
          user: Lampster1304
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Santo_Domingo
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss

      # Calendario de contribuciones (isometrico)
      - name: Calendario de contribuciones
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics/calendario.svg
          user: Lampster1304
          base: ""
          config_timezone: America/Santo_Domingo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
